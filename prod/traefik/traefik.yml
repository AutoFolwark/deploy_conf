# Traefik v3 — prod (prod/docker-compose.yml). Routes: prod/traefik/dynamic/

global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO

accessLog:
  filePath: /logs/access.log

# Dashboard off by default on prod; expose via dynamic router + auth if needed (never insecure: true).
api:
  dashboard: false

entryPoints:
  web:
    address: ":80"
    # ACME httpChallenge still works on :80; other HTTP traffic redirects to HTTPS.
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
        options: default
      middlewares:
        - security-headers@file

providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true
  docker:
    exposedByDefault: false
    network: traefik_net

tls:
  options:
    default:
      minVersion: VersionTLS12
      sniStrict: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: peyrovskaaa@gmail.com
      storage: /letsencrypt/acme.json
      keyType: EC256
      caServer: https://acme-v02.api.letsencrypt.org/directory
      httpChallenge:
        entryPoint: web
