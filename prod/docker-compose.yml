# Docker Compose 2.20+ (include). From repo root (env from Infisical / shell):
#   docker compose -f prod/docker-compose.yml up
#
# Prod does not start bundled PostgreSQL, Redis, or RabbitMQ (profile `embedded-datastores` in
# general/docker-compose.base.yml). Adminer is started below for external DB_HOST (Traefik → database_adminer:8080).
# Set DB_HOST, REDIS_URL, RABBITMQ_URL, CONTAINER_TAG (e.g. via Infisical).
# Redis for auth/api/calculator is ${REDIS_URL}/0, ${REDIS_URL}/1, ${REDIS_URL}/2 (e.g. REDIS_URL=redis://host:6379).

include:
  - path: ../general/docker-compose.base.yml

name: prod

services:
  frontend:
    image: autofolwarkwork/bidmax-frontend:prod
    container_name: frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api.bidmax.eu
    # BFF routes (login, /api/private) call api.bidmax.eu from the container.
    # Resolve to the host so Traefik handles the request locally instead of via Cloudflare.
    extra_hosts:
      - "api.bidmax.eu:host-gateway"
    expose:
      - 3000
    networks:
      - traefik_net

  traefik:
    image: traefik:v3.5
    container_name: traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--log.level=DEBUG"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/logs:/logs
      - traefik_letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik_net

  # Base `adminer` uses profile `embedded-datastores` (bundled Postgres), so it does not run on prod.
  # Traefik file config routes adminer host → database_adminer:8080 — this service satisfies that.
  # Do not use `--profile embedded-datastores` with this file (would duplicate container_name with base adminer).
  adminer_external:
    image: adminer:latest
    container_name: database_adminer
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      ADMINER_DEFAULT_SERVER: ${DB_HOST}
      ADMINER_DESIGN: pepa-linha-dark
      ADMINER_PLUGINS: tables-filter tinymce
    networks:
      - traefik_net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  auth_service:
    environment:
      DB_HOST: ${DB_HOST}
      REDIS_URL: ${REDIS_URL}/0
      RABBITMQ_URL: ${RABBITMQ_URL}
  auth_rpc_service:
    environment:
      DB_HOST: ${DB_HOST}
      REDIS_URL: ${REDIS_URL}/0
      RABBITMQ_URL: ${RABBITMQ_URL}
  auth_init_db:
    environment:
      DB_HOST: ${DB_HOST}
      REDIS_URL: ${REDIS_URL}/0
      RABBITMQ_URL: ${RABBITMQ_URL}

  notification_service:
    environment:
      DB_HOST: ${DB_HOST}
      RABBITMQ_URL: ${RABBITMQ_URL}

  api_service:
    environment:
      DB_HOST: ${DB_HOST}
      REDIS_URL: ${REDIS_URL}/1
  api_rpc_service:
    environment:
      DB_HOST: ${DB_HOST}
      REDIS_URL: ${REDIS_URL}/1
  api_init_db:
    environment:
      DB_HOST: ${DB_HOST}
      REDIS_URL: ${REDIS_URL}/1

  payment_service:
    environment:
      DB_HOST: ${DB_HOST}
      RABBITMQ_URL: ${RABBITMQ_URL}
  payment_rpc_service:
    environment:
      DB_HOST: ${DB_HOST}
      RABBITMQ_URL: ${RABBITMQ_URL}

  carfax_service:
    environment:
      DB_HOST: ${DB_HOST}
      RABBITMQ_URL: ${RABBITMQ_URL}
  carfax_rpc_service:
    environment:
      DB_HOST: ${DB_HOST}
      RABBITMQ_URL: ${RABBITMQ_URL}

  calculator_service:
    environment:
      DB_HOST: ${DB_HOST}
      REDIS_URL: ${REDIS_URL}/2
  calculator_rpc_service:
    environment:
      DB_HOST: ${DB_HOST}
      REDIS_URL: ${REDIS_URL}/2
  calculator_init_db:
    environment:
      DB_HOST: ${DB_HOST}
      REDIS_URL: ${REDIS_URL}/2

  favorites_service:
    environment:
      DB_HOST: ${DB_HOST}

  bid_service:
    environment:
      DB_HOST: ${DB_HOST}
      RABBITMQ_URL: ${RABBITMQ_URL}

  order_service:
    environment:
      DB_HOST: ${DB_HOST}
      RABBITMQ_URL: ${RABBITMQ_URL}

  file_service:
    environment:
      DB_HOST: ${DB_HOST}
      RABBITMQ_URL: ${RABBITMQ_URL}
  file_service_worker:
    environment:
      DB_HOST: ${DB_HOST}
      RABBITMQ_URL: ${RABBITMQ_URL}
  file_service_celery_beat:
    environment:
      DB_HOST: ${DB_HOST}
      RABBITMQ_URL: ${RABBITMQ_URL}
  file_rpc_service:
    environment:
      DB_HOST: ${DB_HOST}
      RABBITMQ_URL: ${RABBITMQ_URL}
