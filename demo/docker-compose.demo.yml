# Docker Compose 2.20+ (include). From repo root: docker compose -f demo/docker-compose.demo.yml up
# Or: cd demo && docker compose -f docker-compose.demo.yml up
#
# Explicit project name keeps volume/network prefixes as `demo_*` (same as when this file lived alone in demo/).

include:
  - path: ../general/docker-compose.base.yml

name: demo

services:
  frontend:
    image: vinasfront/vinas-frontend:demo
    container_name: frontend
    restart: unless-stopped
    expose:
      - 3000
    networks:
      - traefik_net

  # ======================================================================
  # 1. REVERSE PROXY & LOAD BALANCER
  # ======================================================================

  traefik:
    image: traefik:v3.5
    container_name: traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--log.level=DEBUG"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./traefik/demo/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/demo/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/demo/logs:/logs
      - traefik_letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik_net
