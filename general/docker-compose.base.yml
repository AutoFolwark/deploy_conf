# ========================================================================
# SERVICES CONFIGURATION
# ========================================================================

services:

  # ======================================================================
  # 2. CORE BUSINESS MICROSERVICES
  # ======================================================================

  # ----------------------------------------------------------------------
  # 2.1 AUTHENTICATION & AUTHORIZATION SERVICE
  # ----------------------------------------------------------------------
  # Handles user authentication, JWT tokens, and authorization logic

  auth_service:
    <<: *auth-base
    container_name: auth_service
    command: [ "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8003", "--log-level", "debug", "--proxy-headers" ]
    expose: [ "8003" ]
    # Migrations run in auth_init_db; start HTTP only after init exits to avoid alembic races on the same DB.
    depends_on:
      auth_init_db:
        condition: service_completed_successfully
    environment:
      <<: *auth-environment
    healthcheck:
      <<: *healthcheck
      test: [ "CMD-SHELL", "curl -f http://localhost:8003/health || exit 1" ]
    networks:
      - traefik_net        # Public access via Traefik
      - auth_service_net   # Database access
      - internal_net       # Inter-service communication

  auth_rpc_service:
    <<: *auth-base
    container_name: auth_rpc_service
    command: [ "python", "serve_rpc.py" ]
    expose: [ "50054" ]
    depends_on:
      auth_init_db:
        condition: service_completed_successfully
    environment:
      <<: *auth-environment
    healthcheck:
      <<: *healthcheck
      test: [ "CMD-SHELL", "grpc_health_probe -addr=localhost:50054" ]
    networks:
      - auth_rpc_net
      - auth_service_net
      - internal_net

  auth_init_db:
    <<: *auth-base
    container_name: auth_init_db
    command: [ "python", "scripts/init_db.py" ]
    environment:
      <<: *auth-environment
    restart: "no"
    networks:
      - auth_service_net
      - internal_net


  # ----------------------------------------------------------------------
  # 2.2 NOTIFICATION SERVICE
  # ----------------------------------------------------------------------
  # Handles email and SMS notifications via Twilio and SMTP

  notification_service:
    image: autofolwarkwork/notification_service:${CONTAINER_TAG:-main}
    container_name: notification_service
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8004", "--log-level", "debug", "--proxy-headers"]
    expose: ["8004"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${NOTIFICATION_DB_NAME}
      DB_PASS: ${NOTIFICATION_DB_PASS}
      DB_USER: ${NOTIFICATION_DB_USER}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq/
      ROOT_PATH: /notification
      ENVIRONMENT:
      RABBITMQ_EXCHANGE_NAME:
      RABBITMQ_QUEUE_NAME:
      TWILIO_ACCOUNT_SID:
      TWILIO_AUTH_TOKEN:
      TWILIO_MESSAGING_SERVICE_SID:
      SENDER_EMAIL:
      SMPT_SERVER:
      SMPT_PORT:
      TELEGRAM_BOT_TOKEN:
      ADMINS_TG_ID:
      EMAIL_PASSWORD:
      LOGO_URL:
      DEBUG:
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8004/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - traefik_net
      - notification_service_net
      - internal_net

  # ----------------------------------------------------------------------
  # 2.3 MAIN API SERVICE (HTTP + gRPC)
  # ----------------------------------------------------------------------
  # Core auction API handling HTTP requests and business logic

  api_service:
    <<: *api-base
    container_name: api_service
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--log-level", "debug", "--proxy-headers"]
    expose: ["8000"]
    environment:
      <<: *api-environment
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
    networks:
      - api_net            # External API access
      - api_service_net
      - traefik_net
      - internal_net       # Inter-service communication

  # API gRPC Service (Isolated for internal communication)
  api_rpc_service:
    <<: *api-base
    container_name: api_rpc_service
    command: ["python", "serve_rpc.py"]
    expose: ["50051"]
    environment:
      <<: *api-environment
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "grpc_health_probe -addr=api_rpc_service:50051"]
    networks:
      - api_rpc_net        # Isolated gRPC network
      - api_service_net    # Database and Redis access
      - internal_net       # Internal services access

  api_init_db:
    <<: *api-base
    container_name: api_init_db
    command: [ "python", "scripts/init_db.py" ]
    environment:
      <<: *api-environment
    # Serialize migrations on the shared Postgres instance (one init at a time per logical wave).
    depends_on:
      auth_init_db:
        condition: service_completed_successfully
      api_service:
        condition: service_healthy
      api_rpc_service:
        condition: service_healthy
    restart: "no"

    networks:
      - api_rpc_net        # Isolated gRPC network
      - api_service_net    # Database and Redis access
      - internal_net


  # ----------------------------------------------------------------------
  # 2.4 PAYMENT PROCESSING SERVICE (HTTP + gRPC)
  # ----------------------------------------------------------------------
  # Handles payment processing via Stripe integration

  payment_service:
    <<: *payment-base
    container_name: payment_service
    entrypoint: ["/app/entrypoint.sh"]
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8002", "--log-level", "debug", "--proxy-headers"]
    expose: ["8002"]
    environment:
      <<: *payment-environment
      ROOT_PATH: /payment
    depends_on:
      auth_service:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
    networks:
      - traefik_net        # Public access for webhooks
      - payment_service_net # Database access
      - internal_net       # Inter-service communication

  # Payment gRPC Service (Isolated for internal communication)
  payment_rpc_service:
    <<: *payment-base
    container_name: payment_rpc_service
    entrypoint: ["/app/entrypoint.sh"]
    command: ["python", "serve_rpc.py"]
    expose: ["50053"]
    environment:
      <<: *payment-environment
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "grpc_health_probe -addr=payment_rpc_service:50053"]
    networks:
      - payment_rpc_net     # Isolated gRPC network
      - payment_service_net # Database access
      - internal_net        # Internal services access

  # ----------------------------------------------------------------------
  # 2.5 CARFAX INTEGRATION SERVICE (HTTP + gRPC)
  # ----------------------------------------------------------------------
  # Handles vehicle history reports and Carfax API integration

  carfax_service:
    <<: *carfax-base
    container_name: carfax_service
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001", "--log-level", "debug"]
    expose: ["8001"]
    environment:
      <<: *carfax-environment
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
    networks:
      - carfax_service_net
      - internal_net
      - traefik_net

  # Carfax gRPC Service (Isolated for internal communication)
  carfax_rpc_service:
    <<: *carfax-base
    container_name: carfax_rpc_service
    command: ["python", "serve_rpc.py"]
    expose: ["50053"]
    depends_on:
      payment_rpc_service:
        condition: service_healthy
    environment:
      <<: *carfax-environment
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "grpc_health_probe -addr=carfax_rpc_service:50053"]
    networks:
      - carfax_rpc_net      # Isolated gRPC network
      - payment_rpc_net     # Can communicate with payment RPC
      - carfax_service_net  # Database access
      - internal_net        # Internal services access

  # ----------------------------------------------------------------------
  # 2.6 CALCULATOR SERVICE (HTTP + INITIAL DATA LOAD)
  # ----------------------------------------------------------------------
  # Calculate delivery prices for vehicles

  # HTTP Calculator Service
  calculator_service:
    <<: *calculator-base
    container_name: calculator_service
    command:
      [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8005", "--log-level", "debug" ]
    expose: ["8005"]
    environment:
      <<: *calculator-environment
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "curl -f http://localhost:8005/health || exit 1"]
    networks:
      - calculator_service_net
      - internal_net
      - traefik_net
      - api_rpc_net

  # Calculator gRPC Service (Isolated for internal communication)
  calculator_rpc_service:
    <<: *calculator-base
    container_name: calculator_rpc_service
    command: ["python", "app/serve_rpc.py"]
    expose: ["50052"]
    environment:
      <<: *calculator-environment
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "grpc_health_probe -addr=calculator_rpc_service:50052"]
    networks:
      - calculator_rpc_net
      - calculator_service_net
      - api_rpc_net
      - internal_net

    # Initial Data Load Service (runs once to populate DB)
  calculator_init_db:
    <<: *calculator-base
    container_name: calculator_init_db
    command: [ "python", "scripts/init_db.py"]
    environment:
      <<: *calculator-environment
    depends_on:
      api_init_db:
        condition: service_completed_successfully
      calculator_service:
        condition: service_healthy
    restart: "no"

    networks:
      - calculator_service_net
      - internal_net
      - api_rpc_net

  favorites_service:
    <<: *favorites-base
    container_name: favorites_service
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8006", "--log-level", "debug" ]
    depends_on:
      api_rpc_service:
        condition: service_healthy
    restart: unless-stopped
    environment:
      <<: *favorites-environment
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "curl -f http://localhost:8006/health || exit 1"]
    networks:
      - favorites_service_net
      - api_rpc_net
      - internal_net
      - traefik_net

  bid_service:
    <<: *bid-base
    container_name: bid_service
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8007", "--log-level", "debug", "--proxy-headers" ]
    expose: [ "8007" ]
    environment:
      <<: *bid-environment
    restart: unless-stopped
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "curl -f http://localhost:8007/health || exit 1"]
    networks:
      - bid_service_net
      - internal_net
      - api_rpc_net
      - calculator_rpc_net
      - payment_rpc_net
      - auth_rpc_net
      - traefik_net

  # ----------------------------------------------------------------------
  # 2.9 ORDER SERVICE
  # ----------------------------------------------------------------------

  order_service:
    <<: *order-base
    container_name: order_service
    command:
      [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8008", "--log-level", "debug" ]
    expose: ["8008"]
    environment:
      <<: *order-environment
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "curl -f http://localhost:8008/health || exit 1"]
    networks:
      - traefik_net
      - order_service_net
      - internal_net
      - api_rpc_net
      - payment_rpc_net
      - auth_rpc_net
      - calculator_rpc_net
      - file_rpc_net

  # ----------------------------------------------------------------------
  # 2.10 FILE SERVICE
  # ----------------------------------------------------------------------

  file_service:
    <<: *file-base
    container_name: file_service
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8009"]
    expose: ["8009"]
    environment:
      <<: *file-environment
    restart: unless-stopped
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "curl -f http://localhost:8009/health || exit 1"]
    networks:
      - file_service_net
      - internal_net
      - api_rpc_net
      - traefik_net

  file_service_worker:
    <<: *file-base
    container_name: file_service_worker
    command:
      [ "poetry", "run", "celery", "-A", "app.celery_app.celery_app", "worker", "--loglevel=info" ]
    environment:
      <<: *file-environment
    restart: unless-stopped
    networks:
      - file_service_net
      - internal_net
      - api_rpc_net

  file_service_celery_beat:
    <<: *file-base
    container_name: file_service_celery_beat
    command:
      [ "poetry", "run", "celery", "-A", "app.celery_app.celery_app", "beat", "--loglevel=debug", "--scheduler=celery.beat:Scheduler" ]
    environment:
      <<: *file-environment
    restart: unless-stopped
    networks:
      - file_service_net
      - internal_net
      - api_rpc_net

  # File gRPC Service (Isolated for internal communication)
  file_rpc_service:
    <<: *file-base
    container_name: file_rpc_service
    command: ["python", "serve_rpc.py"]
    expose: ["50055"]
    environment:
      <<: *file-environment
    healthcheck:
      <<: *healthcheck
      test: ["CMD-SHELL", "grpc_health_probe -addr=file_rpc_service:50055"]
    networks:
      - file_rpc_net
      - file_service_net
      - internal_net


  # ======================================================================
  # 3. MESSAGE QUEUE SYSTEM
  # ======================================================================

  # ----------------------------------------------------------------------
  # 3.1 RABBITMQ MESSAGE BROKER
  # ----------------------------------------------------------------------
  # Handles asynchronous communication between services
  # Enables event-driven architecture and job queues

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    profiles:
      - embedded-datastores
    restart: unless-stopped
    ports:
      - "5672:5672"   # AMQP protocol
      - "15672:15672" # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
      - RABBITMQ_DEFAULT_VHOST=/
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - rabbitmq_net
      - internal_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ======================================================================
  # 4. CACHING LAYER
  # ======================================================================

  # ----------------------------------------------------------------------
  # 4.1 REDIS (single instance; auth=api=calculator use logical DB 0 / 1 / 2 in REDIS_URL)
  # ----------------------------------------------------------------------
  redis:
    image: redis:8-alpine
    container_name: redis
    profiles:
      - embedded-datastores
    restart: unless-stopped
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - internal_net
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ======================================================================
  # 5. DATABASE LAYER
  # ======================================================================

  # ----------------------------------------------------------------------
  # 5.1 POSTGRESQL (single container; create per-service DBs/roles yourself or via init SQL)
  # Profile embedded-datastores only. Set POSTGRES_PASSWORD when you use this service; it is not
  # required for compose parsing when you use external DBs (e.g. demo/prod without this profile).
  # ----------------------------------------------------------------------
  postgres:
    image: postgres:17.5
    container_name: postgres
    profiles:
      - embedded-datastores
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal_net
      - adminer_database_net

  # ======================================================================
  # 5.2 ADMINER DATABASE MANAGEMENT
  # ======================================================================
  adminer:
    image: adminer:latest
    # Available through Traefik at http://localhost/adminer/
    container_name: database_adminer
    profiles:
      - embedded-datastores
    restart: unless-stopped
    expose:
      - 8080

    environment:
      - ADMINER_DEFAULT_SERVER=postgres
      - ADMINER_DESIGN=pepa-linha-dark
      - ADMINER_PLUGINS=tables-filter tinymce

    networks:
      - adminer_database_net
      - traefik_net            # Доступ через reverse proxy

    depends_on:
      - postgres

    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


  # ======================================================================
  # 6. MONITORING & OBSERVABILITY STACK
  # ======================================================================

  # ----------------------------------------------------------------------
  # 6.1 LOG AGGREGATION SYSTEM
  # ----------------------------------------------------------------------

  # Loki - Centralized log storage and querying
  loki:
    image: grafana/loki:3.5.3
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    networks:
      - monitoring
    restart: unless-stopped

  # Promtail - Log collection agent (collects from all containers)
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/log:/var/log:ro                                    # System logs
      - /var/run/docker.sock:/var/run/docker.sock:ro           # Docker API access
      - /var/lib/docker/containers:/var/lib/docker/containers:ro # Container logs
      - ./promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring
    depends_on:
      - loki
    restart: unless-stopped
    user: root  # Required for accessing Docker logs

  # ----------------------------------------------------------------------
  # 6.2 MONITORING DASHBOARD
  # ----------------------------------------------------------------------

  # Grafana - Visualization and alerting platform
  grafana:
    image: grafana/grafana:12.1.1
    container_name: grafana
    environment:
      # Authentication settings
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false

      # Reverse proxy configuration
      - GF_SERVER_ROOT_URL=http://localhost/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SERVER_HTTP_PORT=3001

      # Logging configuration
      - GF_LOG_LEVEL=info
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - monitoring    # Access to Loki for data source
      - traefik_net   # Public access via reverse proxy
    depends_on:
      - loki
    restart: unless-stopped

# ========================================================================
# ARCHITECTURE SUMMARY
# ========================================================================
#
# SERVICE PORTS:
# - Traefik:             80 (HTTP), 8080 (Dashboard)
# - API Service / RPC:   8000 (HTTP), 50051 (gRPC)
# - Payment Service / RPC: 8002 (HTTP), 50053 (gRPC)
# - Auth Service / RPC:  8003 (HTTP), 50054 (gRPC)
# - Carfax Service / RPC: 8001 (HTTP), 50053 (gRPC)
# - Notification:        8004 (HTTP)
# - Calculator / RPC:    8005 (HTTP), 50052 (gRPC)
# - Favorites:           8006 (HTTP)
# - Bid Service:         8007 (HTTP)
# - Order Service:       8008 (HTTP)
# - File Service / RPC:  8009 (HTTP), 50055 (gRPC)
# - RabbitMQ:            5672 (AMQP), 15672 (Management)
# - Grafana:             3001 (accessible via /grafana/)
#
# COMMUNICATION PATTERNS:
# - HTTP: Public APIs and inter-service REST calls
# - gRPC: High-performance internal service communication across api_rpc_net, payment_rpc_net, auth_rpc_net, carfax_rpc_net, calculator_rpc_net, and file_rpc_net
# - RabbitMQ: Asynchronous event-driven communication
# - Redis: one instance; auth/api/calculator use DB index 0/1/2
#
# SECURITY FEATURES:
# - Network isolation between services
# - One PostgreSQL server; separate DBs/roles per service (provision externally)
# - Health checks for all critical services
# - Environment variable based configuration
# - AWS KMS integration for encryption
#
# MONITORING:
# - Centralized logging via Loki/Promtail
# - Real-time dashboards via Grafana
# - Health checks and automatic restarts
# ========================================================================
