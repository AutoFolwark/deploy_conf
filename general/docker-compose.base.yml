# Base stack shared by environments.
# - Demo: demo/docker-compose.demo.yml uses `include` (frontend + traefik + external DB/Redis env).
# - Dev: merge with dev/docker-compose.dev.yml and `--profile embedded-datastores` for bundled Postgres/Redis/RabbitMQ/Adminer.
#   Dev cannot use `include` for adminer port mapping because included services are not overridable.

# ========================================================================
# MICROSERVICES AUCTION PLATFORM - DOCKER COMPOSE CONFIGURATION
# ========================================================================
# This configuration defines a complete microservices architecture for
# an auction platform with the following components:
# - API Gateway & Load Balancer (Traefik)
# - Core Business Services (API, Payment, Carfax, Auth, Notification)
# - Message Queue System (RabbitMQ)
# - Caching Layer (single Redis; logical DBs per service in REDIS_URL)
# - Database Layer (single PostgreSQL instance; per-service DBs via env)
# - Monitoring & Logging Stack (Grafana, Loki, Promtail)
# ========================================================================

# ========================================================================
# NETWORK CONFIGURATION
# ========================================================================
# Network architecture implements service isolation and secure communication:
# - traefik_net: Public-facing network for reverse proxy
# - *_service_net: Service-specific networks for database access
# - *_rpc_net: Isolated networks for gRPC communication
# - internal_net: Shared network for inter-service communication
# - monitoring: Dedicated network for observability stack

networks:
  # Public-facing network for Traefik reverse proxy
  traefik_net:
    name: traefik_net
    driver: bridge

  # Internal communication network (shared by all services)
  internal_net:
    driver: bridge

  # Service-specific networks for database isolation
  carfax_service_net:
    driver: bridge
  payment_service_net:
    driver: bridge
  auth_service_net:
    driver: bridge
  notification_service_net:
    driver: bridge
  api_service_net:
    driver: bridge
  calculator_service_net:
    driver: bridge
  favorites_service_net:
    driver: bridge
  bid_service_net:
    driver: bridge
  order_service_net:
    driver: bridge
  file_service_net:
    driver: bridge
  file_rpc_net:
    driver: bridge

  # Isolated RPC networks for secure gRPC communication
  carfax_rpc_net:
    driver: bridge
  payment_rpc_net:
    driver: bridge
  api_rpc_net:
    driver: bridge
  auth_rpc_net:
    driver: bridge
  calculator_rpc_net:
    driver: bridge

  # Infrastructure networks
  adminer_database_net:
    driver: bridge
  api_net:
    driver: bridge
  rabbitmq_net:
    driver: bridge
  monitoring:
    driver: bridge

# ========================================================================
# PERSISTENT VOLUMES
# ========================================================================
# Named volumes for data persistence across container restarts

volumes:
  # Reverse proxy & SSL certificates
  traefik_letsencrypt:

  # Single PostgreSQL instance (multiple DBs / roles; provision outside the image or via init SQL)
  pg_data:

  # Single Redis instance (logical DBs /0 /1 /2 for auth / api / calculator)
  redis_data:

  # Message queue data
  rabbitmq_data:

  # Monitoring stack volumes
  grafana-storage:      # Dashboards and configurations
  loki-data:           # Log storage

